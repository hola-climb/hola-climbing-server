spring:
  application:
    name: hola-climbing-server

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}  # 환경변수 없으면 local 기본

  # 영상 업로드 크기 제한 (멀티파트)
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB        # 영상 한 개당 최대
      max-request-size: 500MB     # 요청 전체 최대
      file-size-threshold: 10MB   # 메모리→디스크 전환 임계값

  # Jackson(JSON) 설정
  jackson:
    default-property-inclusion: non_null  # null 필드 응답에서 제외
    time-zone: Asia/Seoul
    # property-naming-strategy 미지정 → camelCase (Java 필드명 그대로). 프론트(Vue3+TS)와 통일.

# MyBatis 설정
mybatis:
  mapper-locations: classpath:mapper/**/*.xml      # XML Mapper 위치
  type-aliases-package: com.holaclimbing.server     # @Alias 자동 스캔 패키지
  type-handlers-package: com.holaclimbing.server.config.typehandler  # 타입 핸들러 위치
  configuration:
    map-underscore-to-camel-case: true   # DB의 user_id ↔ Java의 userId 자동 매핑
    default-fetch-size: 100
    default-statement-timeout: 30
    cache-enabled: true

# Swagger UI 경로 설정
springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true   # 요청 소요시간 표시
    groups-order: asc
  packages-to-scan:
    - com.holaclimbing.server.domain
    - com.holaclimbing.server.common.exception.docs
  paths-to-match: /api/**
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# 서버 설정
server:
  port: 8080
  shutdown: graceful   # 진행 중인 요청 마무리 후 종료
  tomcat:
    connection-timeout: 30s
    max-swallow-size: 500MB   # 영상 업로드 대비
    mbeanregistry:
      enabled: true   # tomcat_threads_* 메트릭 노출 (요청 스레드 포화도 모니터링)

# Actuator 노출 범위
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus   # prometheus → Grafana 대시보드용 스크래핑
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: hola-climbing-server   # 모든 메트릭에 application 라벨 부착 (Grafana 필터용)
#      show-details: always   # when-authorized → always 변경
#      show-components: always
# 앱 자체 커스텀 설정
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}   # 이메일 인증 링크 생성 기준 URL
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}  # 영상 공유 링크 생성 기준 FE URL
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}   # FE(Vue3+Vite) 개발 서버
  upload:
    allowed-extensions: mp4,mov,hevc   # NF-05: MP4·MOV·HEVC
    max-duration-seconds: 60           # NF-05: 최대 60초
    max-file-size-bytes: 209715200     # NF-05: 최대 200MB
  # FCM 푸시 알림 (영상 분석 완료/실패 알림)
  # enabled=false면 NoopFcmSender가 주입되어 호출이 모두 no-op (개발·테스트 기본값).
  # 운영에서는 enabled=true + 서비스 계정 키 경로(또는 GOOGLE_APPLICATION_CREDENTIALS) 지정.
  fcm:
    enabled: ${FCM_ENABLED:false}
    credentials-path: ${FCM_CREDENTIALS_PATH:}

# GCS(Google Cloud Storage) 연동 — 영상 업로드/재생 Signed URL
gcs:
  bucket: ${GCS_BUCKET:hola-climbing-log-videos}
  upload-prefix: videos/uploads        # 업로드 객체 경로 prefix
  signed-url-minutes: 15               # Signed URL 유효시간(분)

# AI 분석 워커(Python) 연동 — 영상 등록 시 분석 요청 디스패치
ai:
  analysis-url: ${AI_ANALYSIS_URL:}    # 비어 있으면 디스패치 비활성화 (개발 환경)
# JWT 설정
jwt:
  secret: ${JWT_SECRET:dev-secret-CHANGE-ME-min-32-chars-long-1234567890}
  access-token-validity-minutes: 30
  refresh-token-validity-days: 14
  issuer: hola-climbing