name: Deploy Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/hola-backend:${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Test
        run: ./mvnw -B clean verify

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Show Google Cloud identity
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "https://${{ vars.GCP_REGION }}-docker.pkg.dev"

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service: ${{ vars.BACKEND_SERVICE }}
          image: ${{ env.IMAGE }}
          flags: >-
            --port=8080
            --vpc-connector=${{ vars.SERVERLESS_VPC_CONNECTOR }}
            --vpc-egress=private-ranges-only
            --allow-unauthenticated
          env_vars: |-
            SPRING_PROFILES_ACTIVE=prod
            APP_BASE_URL=${{ vars.BACKEND_PUBLIC_ORIGIN }}
            FRONTEND_BASE_URL=${{ vars.FRONTEND_BASE_URL }}
            CORS_ALLOWED_ORIGINS=${{ vars.FRONTEND_ORIGINS }}
            OAUTH_ALLOWED_REDIRECT_URIS=${{ vars.OAUTH_ALLOWED_REDIRECT_URIS }}
            SPRING_FLYWAY_ENABLED=true
            SPRING_FLYWAY_BASELINE_ON_MIGRATE=false
            SPRING_DATASOURCE_URL=jdbc:postgresql://${{ vars.AI_VM_PRIVATE_IP }}:5432/hola_climbing
            SPRING_DATASOURCE_USERNAME=hola_user
            SPRING_DATA_REDIS_HOST=${{ vars.AI_VM_PRIVATE_IP }}
            SPRING_DATA_REDIS_PORT=6379
            GCS_BUCKET=${{ vars.GCS_BUCKET }}
            GCS_THUMBNAIL_PUBLIC_BUCKET=hola-climbing-thumbnails-public
            GCS_THUMBNAIL_PUBLIC_BASE_URL=https://storage.googleapis.com/hola-climbing-thumbnails-public
            APP_MAIL_MODE=smtp
            APP_MAIL_FROM=hola.climbing@gmail.com
            SPRING_MAIL_HOST=smtp.gmail.com
            SPRING_MAIL_PORT=587
            SPRING_MAIL_USERNAME=hola.climbing@gmail.com
            SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
            SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
            GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp/gcp-sa.json
            FCM_ENABLED=true
            FCM_CREDENTIALS_PATH=/secrets/firebase/firebase-sa.json
            ADMIN_BOOTSTRAP_ENABLED=false
            ADMIN_BOOTSTRAP_EMAIL=hola.climbing@gmail.com
            GOOGLE_OAUTH_CLIENT_ID=${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
            KAKAO_OAUTH_CLIENT_ID=${{ vars.KAKAO_OAUTH_CLIENT_ID }}
            NAVER_OAUTH_CLIENT_ID=${{ vars.NAVER_OAUTH_CLIENT_ID }}
            MONTHLY_REPORT_MIN_VIDEOS=${{ vars.MONTHLY_REPORT_MIN_VIDEOS }}
            MONTHLY_REPORT_MIN_PROBLEMS=${{ vars.MONTHLY_REPORT_MIN_PROBLEMS }}
            MONTHLY_REPORT_GENERATE_ON_MISS=${{ vars.MONTHLY_REPORT_GENERATE_ON_MISS }}
            MONTHLY_REPORT_PROMPT_VERSION=${{ vars.MONTHLY_REPORT_PROMPT_VERSION }}
            MONTHLY_REPORT_SCHEDULER_ENABLED=${{ vars.MONTHLY_REPORT_SCHEDULER_ENABLED }}
            MONTHLY_REPORT_SCHEDULER_CRON=${{ vars.MONTHLY_REPORT_SCHEDULER_CRON }}
            MONTHLY_REPORT_LLM_MODE=${{ vars.MONTHLY_REPORT_LLM_MODE }}
            MONTHLY_REPORT_LLM_BASE_URL=${{ vars.MONTHLY_REPORT_LLM_BASE_URL }}
            MONTHLY_REPORT_LLM_MODEL=${{ vars.MONTHLY_REPORT_LLM_MODEL }}
            MONTHLY_REPORT_LLM_TIMEOUT_SECONDS=${{ vars.MONTHLY_REPORT_LLM_TIMEOUT_SECONDS }}
          secrets: |-
            SPRING_DATASOURCE_PASSWORD=hola-postgres-password:latest
            SPRING_DATA_REDIS_PASSWORD=hola-redis-password:latest
            JWT_SECRET=hola-jwt-secret:latest
            AI_CALLBACK_SECRET=hola-ai-callback-secret:latest
            METRICS_TOKEN=hola-metrics-token:latest
            SPRING_MAIL_PASSWORD=hola-smtp-password:latest
            GOOGLE_OAUTH_CLIENT_SECRET=hola-google-oauth-client-secret:latest
            KAKAO_OAUTH_CLIENT_SECRET=hola-kakao-oauth-client-secret:latest
            NAVER_OAUTH_CLIENT_SECRET=hola-naver-oauth-client-secret:latest
            MONTHLY_REPORT_LLM_API_KEY=hola-openai-api-key:latest
            /secrets/gcp/gcp-sa.json=hola-gcp-service-account-json:latest
            /secrets/firebase/firebase-sa.json=hola-firebase-service-account-json:latest

      - name: Show deployed URL
        run: |
          echo "Cloud Run URL: ${{ steps.deploy.outputs.url }}"
