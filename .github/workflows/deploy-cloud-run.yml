name: Deploy Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/hola-backend:${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Test
        run: ./mvnw -B clean verify

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Show Google Cloud identity
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - id: cloud-run-env
        name: Prepare Cloud Run env vars
        shell: bash
        env:
          FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
          FRONTEND_ORIGINS: ${{ vars.FRONTEND_ORIGINS }}
        run: |
          if [[ -z "$FRONTEND_ORIGINS" ]]; then
            echo "FRONTEND_ORIGINS GitHub Actions variable is empty" >&2
            exit 1
          fi

          frontend_base_url="${FRONTEND_BASE_URL:-${FRONTEND_ORIGINS%%,*}}"
          cors_allowed_origins="${FRONTEND_ORIGINS//,/\\,}"

          {
            echo "frontend_base_url=$frontend_base_url"
            echo "cors_allowed_origins=$cors_allowed_origins"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "https://${{ vars.GCP_REGION }}-docker.pkg.dev"

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service: ${{ vars.BACKEND_SERVICE }}
          image: ${{ env.IMAGE }}
          flags: >-
            --port=8080
            --vpc-connector=${{ vars.SERVERLESS_VPC_CONNECTOR }}
            --vpc-egress=private-ranges-only
            --allow-unauthenticated
          env_vars: |-
            SPRING_PROFILES_ACTIVE=prod
            APP_BASE_URL=${{ vars.BACKEND_PUBLIC_ORIGIN }}
            FRONTEND_BASE_URL=${{ steps.cloud-run-env.outputs.frontend_base_url }}
            CORS_ALLOWED_ORIGINS=${{ steps.cloud-run-env.outputs.cors_allowed_origins }}
            SPRING_FLYWAY_ENABLED=true
            SPRING_FLYWAY_BASELINE_ON_MIGRATE=false
            SPRING_DATASOURCE_URL=jdbc:postgresql://${{ vars.AI_VM_PRIVATE_IP }}:5432/hola_climbing
            SPRING_DATASOURCE_USERNAME=hola_user
            SPRING_DATA_REDIS_HOST=${{ vars.AI_VM_PRIVATE_IP }}
            SPRING_DATA_REDIS_PORT=6379
            GCS_BUCKET=${{ vars.GCS_BUCKET }}
            APP_MAIL_MODE=smtp
            APP_MAIL_FROM=hola.climbing@gmail.com
            SPRING_MAIL_HOST=smtp.gmail.com
            SPRING_MAIL_PORT=587
            SPRING_MAIL_USERNAME=hola.climbing@gmail.com
            SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
            SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
            GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp/gcp-sa.json
            FCM_ENABLED=true
            FCM_CREDENTIALS_PATH=/secrets/firebase/firebase-sa.json
            ADMIN_BOOTSTRAP_ENABLED=false
            ADMIN_BOOTSTRAP_EMAIL=hola.climbing@gmail.com
          secrets: |-
            SPRING_DATASOURCE_PASSWORD=hola-postgres-password:latest
            SPRING_DATA_REDIS_PASSWORD=hola-redis-password:latest
            JWT_SECRET=hola-jwt-secret:latest
            AI_CALLBACK_SECRET=hola-ai-callback-secret:latest
            METRICS_TOKEN=hola-metrics-token:latest
            SPRING_MAIL_PASSWORD=hola-smtp-password:latest
            /secrets/gcp/gcp-sa.json=hola-gcp-service-account-json:latest
            /secrets/firebase/firebase-sa.json=hola-firebase-service-account-json:latest

      - name: Show deployed URL
        run: |
          echo "Cloud Run URL: ${{ steps.deploy.outputs.url }}"
